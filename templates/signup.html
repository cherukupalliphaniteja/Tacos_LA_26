{% extends "base.html" %}
{% block title %}Sign Up -- Tacos LA 26{% endblock %}

{% block content %}

<section class="auth-page">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p>Join us to order faster, save addresses, and track your orders.</p>
    <form method="POST" action="{{ url_for('signup') }}" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="(323) 555-1234"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6"/>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-fire btn-block">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</section>

{% endblock %}
