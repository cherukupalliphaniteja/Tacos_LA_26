<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="csrf-token" content="{{ csrf_token() }}"/>
  <title>Admin Login — Tacos LA 26</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#1A0F05;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
    .login-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
    .logo{text-align:center;margin-bottom:32px;}
    .logo img{height:64px;}
    .logo p{color:#888;font-size:13px;margin-top:8px;text-transform:uppercase;letter-spacing:1.5px;}
    h2{font-size:22px;font-weight:700;color:#1A0F05;margin-bottom:24px;text-align:center;}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    input{width:100%;padding:12px 16px;border:2px solid #e8e0d8;border-radius:10px;font-size:15px;color:#1A0F05;outline:none;transition:border-color .2s;}
    input:focus{border-color:#D4380D;}
    .btn{width:100%;background:#D4380D;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px;}
    .btn:hover{background:#b82e08;}
    .flash{background:#ffeaea;border:1px solid #f5c6c6;color:#c0392b;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <img src="https://tacos-la26.com/wp-content/uploads/2024/07/cropped-tacosla26logo.webp" alt="Tacos LA 26"/>
      <p>Restaurant Admin</p>
    </div>
    <h2>Sign In</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username" placeholder="admin"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn">Sign In to Dashboard</button>
    </form>
  </div>
</body>
</html>
